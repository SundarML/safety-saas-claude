{% extends "base.html" %}
{% block title %}Delete — {{ item.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card shadow-sm border-danger">
      <div class="card-body p-4 text-center">
        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:2.5rem;"></i>
        <h5 class="fw-bold mt-3 mb-1">Delete Compliance Item?</h5>
        <p class="text-muted mb-1">This will permanently delete:</p>
        <p class="fw-semibold">{{ item.title }}</p>
        <p class="text-muted small">This action cannot be undone. Any uploaded evidence will also be removed.</p>
        <div class="d-flex justify-content-center gap-2 mt-4">
          <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">
              <i class="bi bi-trash me-1"></i> Yes, Delete
            </button>
          </form>
          <a href="{% url 'compliance:item_detail' item.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
